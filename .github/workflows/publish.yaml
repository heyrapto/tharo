name: CI / Publish

on:
  push:
    branches: [main]
    tags:
      - "v*" # Triggers publish on any tag like v1.0.0, v1.2.3
  pull_request:
    branches: [main] # Runs tests on every PR to main

jobs:
  # ── JOB 1: Run on every push and PR ───────────────────────────────────────
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci # ci is stricter than install — uses package-lock.json exactly

      - name: Type check
        run: npx tsc --noEmit # Checks types without writing files

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  # ── JOB 2: Only runs when you push a version tag (v1.0.0) ─────────────────
  publish:
    name: Publish to npm
    needs: test # Won't run if tests fail
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
